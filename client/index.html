<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Information Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-paw"></i>
                <span>Animal IMS</span>
            </div>
            <nav>
                <ul>
                    <li><a href="#" data-view="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a href="#" data-view="animals"><i class="fas fa-dog"></i> Animals</a></li>
                    <li><a href="#" data-view="owners"><i class="fas fa-user-friends"></i> Owners</a></li>
                    <li><a href="#" data-view="appointments"><i class="fas fa-calendar-alt"></i> Appointments</a></li>
                    <li><a href="#" data-view="medical"><i class="fas fa-file-medical"></i> Medical Records</a></li>
                </ul>
            </nav>
        </aside>
        <main class="main-content">
            <header>
                <h1 id="view-title">Dashboard</h1>
            </header>
            <section id="content">
                <!-- Dynamic content will be loaded here -->
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <i class="fas fa-dog"></i>
                        <div class="info">
                            <h3>Total Animals</h3>
                            <p id="total-animals">0</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-user-friends"></i>
                        <div class="info">
                            <h3>Total Owners</h3>
                            <p id="total-owners">0</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for adding/editing data -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Add New Record</h2>
            <form id="record-form">
                <!-- Form fields will be injected here -->
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
